<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e2e8f0"/>
      <stop offset="25%"  stop-color="#c084fc"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="75%"  stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle glow -->
  <circle cx="50" cy="50" r="50" fill="url(#glow)"/>

  <!-- "C" lettermark with chrome gradient -->
  <text
    x="50"
    y="76"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82"
    font-weight="900"
    text-anchor="middle"
    fill="url(#chrome)"
  >C</text>

  <!-- Small claw scratch accents -->
  <line x1="68" y1="12" x2="74" y2="30" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="72" y1="14" x2="78" y2="32" stroke="#f0abfc" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  <line x1="76" y1="16" x2="82" y2="34" stroke="#c084fc" stroke-width="1"   stroke-linecap="round" opacity="0.4"/>
</svg>
